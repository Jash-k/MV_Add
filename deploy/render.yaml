# ═══════════════════════════════════════════════════════════
#  Render Blueprint — One-Click Deploy
#  Place this file at the ROOT of your GitHub repository
#  alongside server.js and package.json
# ═══════════════════════════════════════════════════════════

services:
  - type: web
    name: stremio-m3u-addon
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: M3U_URL
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: PORT
        value: 7000
      - key: REFRESH_HOURS
        value: 6
