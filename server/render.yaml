# render.yaml — Blueprint for Render deployment
# Place this in your repo root or server/ directory

services:
  - type: web
    name: stremio-m3u-addon
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: M3U_URL
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: RENDER_EXTERNAL_URL
        generateValue: true
      - key: PORT
        value: 7000
      - key: REFRESH_HOURS
        value: 6
